# droppost nginx config
# Place at /etc/nginx/sites-available/droppost
# Symlink: ln -s /etc/nginx/sites-available/droppost /etc/nginx/sites-enabled/droppost
#
# Requires:
#   /etc/nginx/conf.d/droppost-keys.conf  (gitignored, copy from keys.conf.example)

# API key validation map — populated from the separate keys file
include /etc/nginx/conf.d/droppost-keys.conf;

# ─── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # certbot will manage this block after: certbot --nginx -d YOUR_DOMAIN
    return 301 https://$host$request_uri;
}

# ─── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # TLS — managed by certbot
    # ssl_certificate and ssl_certificate_key are added by certbot automatically

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size 110M;  # slightly above rustypaste's max_content_length

    # ── API key check ─────────────────────────────────────────────────────────
    # $authorized is set by the map in droppost-keys.conf
    # 0 = unknown key → 401
    # 1 = valid key   → proxy through
    if ($authorized = 0) {
        return 401 "Unauthorized\n";
    }

    # ── Proxy to rustypaste on local PC via WireGuard ─────────────────────────
    location / {
        proxy_pass         http://10.8.0.2:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Strip the client Authorization header so rustypaste never sees user keys.
        # rustypaste has no auth_token set — WireGuard is the trust boundary.
        proxy_set_header   Authorization "";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
